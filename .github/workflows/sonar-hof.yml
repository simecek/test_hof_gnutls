name: Sonar Hall of Fame

on:
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake autopoint gettext gperf libtool \
            pkg-config nettle-dev libtasn1-6-dev libunistring-dev libidn2-dev \
            libp11-kit-dev unzip curl

      - name: Download Sonar build-wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper.zip

      - name: Configure GnuTLS
        id: configure
        continue-on-error: true
        run: |
          if [ -x ./bootstrap ]; then
            ./bootstrap --no-git --skip-po || ./bootstrap --no-git || ./bootstrap
          fi
          ./configure --disable-doc --disable-tests --disable-tools --without-p11-kit

      - name: Build with Sonar build-wrapper
        id: build
        continue-on-error: true
        run: ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output make -j2

      - name: Check compilation database
        id: bw
        run: |
          if [ -s bw-output/compile_commands.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud scan with compilation database
        if: steps.bw.outputs.exists == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud scan with AutoConfig fallback
        if: steps.bw.outputs.exists != 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
